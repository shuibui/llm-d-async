apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./base

namePrefix: vllm-qwen3-0-6b-

images:
  - name: REPLACE_MODEL_SERVER_IMAGE
    newName: vllm/vllm-openai
    newTag: v0.19.1

labels:
  - pairs:
      llm-d.ai/model: Qwen3-0.6B
      llm-d.ai/guide: optimized-baseline
      inference_pool: optimized-baseline
    includeSelectors: true
    includeTemplates: true
    fields:
      - version: v1
        kind: ServiceAccount
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/selector/matchLabels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/template/metadata/labels
        create: true

patches:
  - path: patch-vllm.yaml
