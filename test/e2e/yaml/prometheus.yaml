apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: ${NAMESPACE}
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: prometheus-pod-reader
  namespace: ${NAMESPACE}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: prometheus-pod-reader-binding
  namespace: ${NAMESPACE}
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: ${NAMESPACE}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus-pod-reader
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ${NAMESPACE}
data:
  prometheus.yml: |
    global:
      scrape_interval: 2s
      evaluation_interval: 2s
    scrape_configs:
      - job_name: 'epp'
        static_configs:
          - targets: ['epp-svc.e2e-integration.svc.cluster.local:9090']
      - job_name: 'model-servers'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['e2e-integration']
        relabel_configs:
          # Only scrape pods with the inference_pool label.
          - source_labels: [__meta_kubernetes_pod_label_inference_pool]
            regex: .+
            action: keep
          # Use port 8000 (vLLM metrics port).
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            regex: "8000"
            action: keep
          # Carry the inference_pool pod label into scraped metrics.
          # Required for prometheus-budget and prometheus-saturation gates:
          # vLLM does not emit this label natively, so without this relabeling
          # the fallback query (vllm:num_requests_running{inference_pool=...})
          # returns empty results and the gate reports "all metric sources unavailable".
          - source_labels: [__meta_kubernetes_pod_label_inference_pool]
            target_label: inference_pool
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: ${NAMESPACE}
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30491
  type: NodePort
