apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: e2e-pool
  namespace: ${NAMESPACE}
spec:
  targetPorts:
    - number: 8000
  selector:
    matchLabels:
      app: llm-sim
  endpointPickerRef:
    name: epp-svc
    kind: Service
    port:
      number: 9002
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: epp
  namespace: ${NAMESPACE}
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: epp-pod-read
  namespace: ${NAMESPACE}
rules:
  - apiGroups: ["inference.networking.x-k8s.io"]
    resources: ["inferenceobjectives", "inferencemodelrewrites"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["inference.networking.k8s.io"]
    resources: ["inferencepools"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "watch", "list"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: epp-pod-read-binding
  namespace: ${NAMESPACE}
subjects:
  - kind: ServiceAccount
    name: epp
    namespace: ${NAMESPACE}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: epp-pod-read
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: epp-auth-reviewer
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: epp-auth-reviewer-binding
subjects:
  - kind: ServiceAccount
    name: epp
    namespace: ${NAMESPACE}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: epp-auth-reviewer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epp
  namespace: ${NAMESPACE}
  labels:
    app: epp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epp
  template:
    metadata:
      labels:
        app: epp
    spec:
      serviceAccountName: epp
      terminationGracePeriodSeconds: 10
      containers:
        - name: epp
          image: ${EPP_IMAGE}
          imagePullPolicy: Never
          args:
            - --pool-name
            - "e2e-pool"
            - --pool-namespace
            - "${NAMESPACE}"
            - --v
            - "4"
            - --zap-encoder
            - "json"
            - --grpc-port
            - "9002"
            - --grpc-health-port
            - "9003"
            - --config-file
            - /config/default-plugins.yaml
            - --metrics-endpoint-auth=false
          ports:
            - containerPort: 9002
            - containerPort: 9003
            - name: metrics
              containerPort: 9090
          livenessProbe:
            grpc:
              port: 9003
              service: inference-extension
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 9003
              service: inference-extension
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: plugins-config-volume
              mountPath: "/config"
      volumes:
        - name: plugins-config-volume
          configMap:
            name: epp-plugins-config
---
apiVersion: v1
kind: Service
metadata:
  name: epp-svc
  namespace: ${NAMESPACE}
spec:
  selector:
    app: epp
  ports:
    - name: grpc
      protocol: TCP
      port: 9002
      targetPort: 9002
      appProtocol: http2
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
